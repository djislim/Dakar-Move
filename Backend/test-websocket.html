<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test WebSocket — Dakar Move</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; background: #1a0e00; color: white; padding: 20px; }
  h1 { color: #f5a623; }
  #log { background: #0d0800; border: 1px solid #333; border-radius: 8px; padding: 15px; height: 500px; overflow-y: auto; font-family: monospace; font-size: 13px; }
  .entry { padding: 6px 0; border-bottom: 1px solid #222; }
  .position { color: #5de8a0; }
  .alert { color: #f0956a; font-weight: bold; }
  .info { color: #888; }
  input, button { padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid #333; background: #222; color: white; }
  button { background: #f5a623; color: #1a0800; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
  <h1>🚌 Test WebSocket — Dakar Move</h1>
  
  <div>
    <input type="number" id="lineId" placeholder="ID de la ligne" value="1">
    <button onclick="subscribe()">S'abonner à la ligne</button>
    <button onclick="clearLog()">Effacer le log</button>
  </div>

  <div id="log"></div>

  <script>
    const socket = io("http://localhost:3000");
    const log = document.getElementById("log");

    function addEntry(text, className = "info") {
      const entry = document.createElement("div");
      entry.className = "entry " + className;
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${text}`;
      log.prepend(entry);
    }

    function clearLog() {
      log.innerHTML = "";
    }

    function subscribe() {
      const lineId = document.getElementById("lineId").value;
      socket.emit("subscribe:line", lineId);
      addEntry(`📡 Abonné à la ligne ${lineId}`, "info");
    }

    socket.on("connect", () => {
      addEntry("✅ Connecté au serveur WebSocket", "info");
    });

    socket.on("disconnect", () => {
      addEntry("❌ Déconnecté du serveur", "alert");
    });

    socket.on("bus:position", (data) => {
      addEntry(
        `🚌 Bus position — Trip ${data.trip_id} : ${data.latitude.toFixed(4)}, ${data.longitude.toFixed(4)}`,
        "position"
      );
    });

    socket.on("connect_error", (err) => {
      addEntry(`⚠️ Erreur de connexion : ${err.message}`, "alert");
    });
  </script>
</body>
</html>
